kind = "web"
previewPath = "/"
title = "RideNow"
version = "1.0.0"
id = "artifacts/ridenow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25753

[services.development]
run = "pnpm --filter @workspace/ridenow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ridenow", "run", "build" ]
publicDir = "artifacts/ridenow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25753"
BASE_PATH = "/"
